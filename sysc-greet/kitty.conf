# kitty config for the greeter session (security-hardened)
# This is NOT your regular kitty config — it lives at /etc/greetd/kitty.conf

font_family      JetBrainsMono Nerd Font
font_size        11.0

initial_window_width  800
initial_window_height 600

cursor_shape     block
cursor_blink_interval 0.5

background_opacity 1.0

hide_window_decorations yes
window_padding_width 0

shell_integration disabled
allow_remote_control no

# Disable escape hatches — no new tabs/windows/overlays from the login screen
map ctrl+shift+t no_op
map ctrl+shift+n no_op
map ctrl+shift+q no_op
map ctrl+shift+enter no_op
map ctrl+q no_op
map ctrl+shift+plus no_op
map ctrl+shift+minus no_op
map ctrl+shift+backspace no_op
map ctrl+shift+s no_op
map ctrl+shift+f no_op
map ctrl+shift+h no_op
map ctrl+shift+y no_op

mouse_hide_wait 3.0
